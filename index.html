<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Бортжурнал Весты</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --acc:#38bdf8; --text:#f1f5f9; }
    body { background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, sans-serif; margin:0; padding: env(safe-area-inset-top) 15px 15px 15px; user-select: none; }
    .nav { display:flex; gap:8px; overflow-x:auto; margin-bottom:20px; padding-bottom:10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .nav::-webkit-scrollbar { display: none; }
    .nav div { flex-shrink:0; padding:10px 16px; background:var(--card); border-radius:12px; font-size:12px; font-weight:bold; border:1px solid #334155; }
    .nav .active { background:var(--acc); color:#000; border-color:var(--acc); }
    .card { background:var(--card); padding:18px; border-radius:18px; margin-bottom:12px; border:1px solid #334155; }
    input, select { width:100%; padding:14px; margin:8px 0; border-radius:12px; border:1px solid #475569; background:#0f172a; color:white; font-size:16px; box-sizing:border-box; }
    .btn { background:var(--acc); color:#000; border:none; padding:16px; border-radius:14px; width:100%; font-weight:800; font-size:16px; margin-top:5px; cursor:pointer; }
    .btn:disabled { opacity: 0.5; }
    .img-preview { width:100%; border-radius:12px; display:none; margin:10px 0; border:1px solid var(--acc); }
    .task-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #334155; font-size:14px; }
    .history-item { padding:12px; border-radius:12px; background:#16213e; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>

  <div class="nav" id="main-nav">
    <div class="active" onclick="tab(1, this)">СТАТУС</div>
    <div onclick="tab(2, this)">СЕРВИС</div>
    <div onclick="tab(3, this)">АЗС</div>
    <div onclick="tab(4, this)">МОЙКА</div>
    <div onclick="tab(5, this)">КАТАЛОГ</div>
    <div onclick="tab(6, this)">ИСТОРИЯ</div>
  </div>

  <div id="app">
    <div id="p1">
      <div class="card">
        <small style="opacity:0.7">ТЕКУЩИЙ ПРОБЕГ / МОТОЧАСЫ</small>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <input type="number" id="in-km" placeholder="Пробег, км">
          <input type="number" id="in-h" placeholder="М/часы">
        </div>
        <button class="btn" onclick="updateStats()">ОБНОВИТЬ ДАННЫЕ</button>
      </div>
      <div class="card">
        <h4 style="margin:0 0 10px 0; color:var(--acc)">ПРЕДСТОЯЩИЕ ЗАДАЧИ</h4>
        <div id="task-list"><small>Загрузка...</small></div>
      </div>
    </div>

    <div id="p2" style="display:none">
      <div class="card">
        <h3>🔧 Обслуживание</h3>
        <input id="s-task" placeholder="Описание работ">
        <input type="number" id="s-cost" placeholder="Стоимость (запчасти + работа)">
        <input type="file" accept="image/*" id="s-file" onchange="showPrev(this)">
        <img class="img-preview">
        <button class="btn" id="btn-s" onclick="saveService()">СОХРАНИТЬ В ОБЛАКО</button>
      </div>
    </div>

    <div id="p3" style="display:none">
      <div class="card">
        <h3>⛽ Заправка</h3>
        <input type="number" id="f-l" placeholder="Количество литров">
        <input type="number" id="f-p" placeholder="Цена за литр">
        <input type="file" accept="image/*" capture="camera" id="f-file" onchange="showPrev(this)">
        <img class="img-preview">
        <button class="btn" id="btn-f" onclick="saveFuel()">ЗАПИСАТЬ</button>
      </div>
    </div>

    <div id="p4" style="display:none">
      <div class="card">
        <h3>🧼 Мойка</h3>
        <select id="w-type">
          <option>Комплекс</option>
          <option>Кузов + Коврики</option>
          <option>Техническая</option>
          <option>Самообслуживание</option>
        </select>
        <input type="number" id="w-cost" placeholder="Цена, ₽">
        <button class="btn" id="btn-w" onclick="saveWash()">ЗАПИСАТЬ</button>
      </div>
    </div>

    <div id="p5" style="display:none">
      <div id="cat-list"></div>
    </div>

    <div id="p6" style="display:none">
      <div id="hist-list"></div>
    </div>
  </div>

<script>
  // ВСТАВЬ СВОИ ДАННЫЕ ТУТ
  const SUPABASE_URL = 'ТВОЙ_URL';
  const SUPABASE_KEY = 'ТВОЙ_ANON_KEY';
  const TG_TOKEN = 'ТОКЕН_БОТА';
  const TG_CHAT_ID = 'ID_ЧАТА';

  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Переключение вкладок
  function tab(n, el) {
    document.querySelectorAll('[id^="p"]').forEach(p => p.style.display = 'none');
    document.getElementById('p'+n).style.display = 'block';
    document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
    if(n === 1) loadStats();
    if(n === 5) loadCatalog();
    if(n === 6) loadHistory();
  }

  function showPrev(el) {
    const img = el.nextElementSibling;
    img.src = URL.createObjectURL(el.files[0]);
    img.style.display = 'block';
  }

  async function upload(file) {
    if(!file) return null;
    const name = `img_${Date.now()}.jpg`;
    const { data } = await _sb.storage.from('photos').upload(name, file);
    return _sb.storage.from('photos').getPublicUrl(name).data.publicUrl;
  }

  async function sendTg(txt) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: TG_CHAT_ID, text: txt, parse_mode: 'HTML'})
    });
  }

  // --- ЛОГИКА ОБНОВЛЕНИЯ ДАННЫХ ---
  async function loadStats() {
    const { data } = await _sb.from('settings').select('*');
    const stats = {};
    data.forEach(i => stats[i.key] = i.value);
    document.getElementById('in-km').value = stats.current_km;
    document.getElementById('in-h').value = stats.current_h;
    
    // Расчет задач
    const { data: sched } = await _sb.from('maintenance_schedule').select('*');
    const html = sched.map(s => {
      let prog = 0;
      if(s.type === 'Mileage') prog = (stats.current_km % s.trigger_value) / s.trigger_value * 100;
      if(s.type === 'Hours') prog = (stats.current_h % s.trigger_value) / s.trigger_value * 100;
      return `<div class="task-item"><span>${s.task}</span><b style="color:${prog > 80 ? '#f87171' : '#38bdf8'}">${Math.round(prog)}%</b></div>`;
    }).join('');
    document.getElementById('task-list').innerHTML = html;
  }

  async function updateStats() {
    const km = document.getElementById('in-km').value;
    const h = document.getElementById('in-h').value;
    await _sb.from('settings').update({value: km}).eq('key', 'current_km');
    await _sb.from('settings').update({value: h}).eq('key', 'current_h');
    alert('Данные обновлены');
    loadStats();
  }

  async function saveFuel() {
    const b = document.getElementById('btn-f'); b.disabled = true;
    const l = document.getElementById('f-l').value;
    const p = document.getElementById('f-p').value;
    const km = document.getElementById('in-km').value;
    const photo = await upload(document.getElementById('f-file').files[0]);
    
    const total = l * p;
    await _sb.from('fuel_logs').insert({liters: l, price: p, km: km, total: total, photo_url: photo});
    await _sb.from('history').insert({category: '⛽ АЗС', km: km, description: `Заправка ${l}л`, cost: total, photo_url: photo});
    
    await sendTg(`⛽ <b>Заправка!</b>\nПробег: ${km}\nСумма: ${total}₽`);
    alert('Записано!');
    b.disabled = false; tab(1, document.querySelector('.nav div'));
  }

  async function saveService() {
    const b = document.getElementById('btn-s'); b.disabled = true;
    const task = document.getElementById('s-task').value;
    const cost = document.getElementById('s-cost').value;
    const km = document.getElementById('in-km').value;
    const photo = await upload(document.getElementById('s-file').files[0]);

    await _sb.from('service_logs').insert({task: task, part_cost: cost, km: km, photo_url: photo});
    await _sb.from('history').insert({category: '🔧 Сервис', km: km, description: task, cost: cost, photo_url: photo});
    
    await sendTg(`🔧 <b>Сервис</b>\n${task}\nЦена: ${cost}₽`);
    alert('Сохранено!');
    b.disabled = false; tab(1, document.querySelector('.nav div'));
  }

  async function saveWash() {
    const b = document.getElementById('btn-w'); b.disabled = true;
    const type = document.getElementById('w-type').value;
    const cost = document.getElementById('w-cost').value;
    const km = document.getElementById('in-km').value;

    await _sb.from('wash_logs').insert({type: type, cost: cost});
    await _sb.from('history').insert({category: '🧼 Мойка', km: km, description: type, cost: cost});
    
    await sendTg(`🧼 <b>Мойка</b>\n${type}\nЦена: ${cost}₽`);
    alert('Записано!');
    b.disabled = false; tab(1, document.querySelector('.nav div'));
  }

  async function loadCatalog() {
    const { data } = await _sb.from('parts_catalog').select('*');
    document.getElementById('cat-list').innerHTML = data.map(i => `
      <div class="card">
        <div style="color:var(--acc); font-weight:800">${i.name}</div>
        <div style="font-size:13px; margin-top:5px;">OEM: <code>${i.oem}</code></div>
        <div style="font-size:13px; color:#94a3b8">Аналог: ${i.analog}</div>
      </div>
    `).join('');
  }

  async function loadHistory() {
    const { data } = await _sb.from('history').select('*').order('created_at', {ascending: false});
    document.getElementById('hist-list').innerHTML = data.map(h => `
      <div class="history-item">
        <div><b>${h.category}</b><br><small style="opacity:0.6">${h.description}</small></div>
        <div style="text-align:right"><b>${h.cost} ₽</b><br><small>${h.km} км</small></div>
      </div>
    `).join('');
  }

  loadStats();
</script>
</body>
</html>

    </div>

    <div id="p2" style="display:none">
      <div class="card">
        <h3>🔧 Сервис</h3>
        <input id="s-task" placeholder="Что сделали?">
        <input type="number" id="s-cost" placeholder="Стоимость (общая), ₽">
        <input type="file" accept="image/*" id="s-file" onchange="preview(this)">
        <img class="img-preview" id="s-img">
        <button class="btn" id="s-btn" onclick="saveService()">СОХРАНИТЬ</button>
      </div>
    </div>

    <div id="p3" style="display:none">
      <div class="card">
        <h3>⛽ Заправка</h3>
        <input type="number" id="f-l" placeholder="Литры">
        <input type="number" id="f-p" placeholder="Цена за литр">
        <input type="file" accept="image/*" capture="camera" id="f-file" onchange="preview(this)">
        <img class="img-preview" id="f-img">
        <button class="btn" id="f-btn" onclick="saveFuel()">ЗАПИСАТЬ</button>
      </div>
    </div>

    <div id="p4" style="display:none">
      <div id="hist-list"></div>
    </div>
  </div>

<script>
  // --- КОНФИГУРАЦИЯ ---
  const SUPABASE_URL = 'https://aqadykgccwhlebzykrcq.supabase.co';
  const SUPABASE_KEY = sb_publishable_9obwGRLZL51CzAKEgQMosg_D87L5J1J 'ТВОЙ_ANON_KEY_ИЗ_НАСТРОЕК';
  const TG_TOKEN = '8712794502:AAHPboDckNXVW657jOz2OSs1mrn_NrkDoCc';
  const TG_CHAT_ID = '172376220';

  const supabase = exports.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function tab(n) {
    document.querySelectorAll('[id^="p"]').forEach(p => p.style.display = 'none');
    document.getElementById('p'+n).style.display = 'block';
    document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
    document.getElementById('t'+n).classList.add('active');
    if(n === 4) loadHistory();
  }

  function preview(el) {
    const file = el.files[0];
    const img = el.nextElementSibling;
    img.src = URL.createObjectURL(file);
    img.style.display = 'block';
  }

  async function uploadImg(file) {
    if(!file) return null;
    const name = `${Date.now()}_${file.name}`;
    const { data, error } = await supabase.storage.from('photos').upload(name, file);
    if(error) return null;
    const { data: urlData } = supabase.storage.from('photos').getPublicUrl(name);
    return urlData.publicUrl;
  }

  async function sendTg(msg) {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML'})
    });
  }

  async function updateKm() {
    const km = document.getElementById('in-km').value;
    await supabase.from('settings').update({value: km}).eq('key', 'current_km');
    document.getElementById('disp-km').innerText = km + ' км';
    alert('Пробег обновлен');
  }

  async function saveFuel() {
    const btn = document.getElementById('f-btn');
    btn.disabled = true; btn.innerText = 'Загрузка...';
    
    const l = document.getElementById('f-l').value;
    const p = document.getElementById('f-p').value;
    const { data: set } = await supabase.from('settings').select('value').eq('key', 'current_km').single();
    const photo = await uploadImg(document.getElementById('f-file').files[0]);
    
    const total = l * p;
    await supabase.from('fuel_logs').insert({liters: l, price: p, km: set.value, total: total, photo_url: photo});
    await supabase.from('history').insert({category: 'АЗС', km: set.value, description: `Заправка ${l}л`, cost: total, photo_url: photo});
    
    await sendTg(`⛽ <b>Заправка!</b>\n${l}л по ${p}₽\nИтого: ${total}₽`);
    alert('Готово!');
    location.reload();
  }

  async function saveService() {
    const btn = document.getElementById('s-btn');
    btn.disabled = true;
    const task = document.getElementById('s-task').value;
    const cost = document.getElementById('s-cost').value;
    const { data: set } = await supabase.from('settings').select('value').eq('key', 'current_km').single();
    const photo = await uploadImg(document.getElementById('s-file').files[0]);

    await supabase.from('service_logs').insert({task: task, part_cost: cost, km: set.value, photo_url: photo});
    await supabase.from('history').insert({category: 'Сервис', km: set.value, description: task, cost: cost, photo_url: photo});
    
    await sendTg(`🔧 <b>Сервис!</b>\n${task}\nЦена: ${cost}₽`);
    alert('Записано!');
    location.reload();
  }

  async function loadHistory() {
    const { data } = await supabase.from('history').select('*').order('created_at', {ascending: false});
    document.getElementById('hist-list').innerHTML = data.map(h => `
      <div class="history-item">
        <div><b>${h.category}</b><br><small>${h.description}</small></div>
        <div style="text-align:right"><b>${h.cost} ₽</b><br><small>${h.km} км</small></div>
      </div>
    `).join('');
  }

  // Загрузка начального пробега
  async function init() {
    const { data } = await supabase.from('settings').select('value').eq('key', 'current_km').single();
    if(data) document.getElementById('disp-km').innerText = data.value + ' км';
  }
  init();
</script>
</body>
</html>
