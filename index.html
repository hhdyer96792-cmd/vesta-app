<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vesta Analytics OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --acc:#38bdf8; --text:#f1f5f9; --red:#f87171; }
        body { background:var(--bg); color:var(--text); font-family: -apple-system, sans-serif; margin:0; padding: env(safe-area-inset-top) 15px 30px 15px; }
        .nav { display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding:10px 0; scrollbar-width: none; }
        .nav div { flex-shrink:0; padding:10px 14px; background:var(--card); border-radius:10px; font-size:11px; font-weight:800; border:1px solid #334155; }
        .nav .active { background:var(--acc); color:#000; }
        .card { background:var(--card); padding:18px; border-radius:20px; margin-bottom:12px; border:1px solid #334155; }
        input, select { width:100%; padding:14px; margin:8px 0; border-radius:12px; border:1px solid #475569; background:#0f172a; color:white; font-size:16px; box-sizing:border-box; }
        .btn { background:var(--acc); color:#000; border:none; padding:16px; border-radius:14px; width:100%; font-weight:800; font-size:16px; cursor:pointer; }
        .btn-red { background:var(--red); color:white; margin-top:5px; }
        .chart-container { height: 200px; margin-top: 10px; }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #334155; font-size:14px; }
        .parts-badge { font-size:10px; background:#334155; padding:4px 8px; border-radius:6px; display:block; margin-top:5px; color:var(--acc); }
    </style>
</head>
<body>

    <div class="nav">
        <div id="t1" class="active" onclick="tab(1)">АНАЛИТИКА</div>
        <div id="t2" onclick="tab(2)">СЕРВИС</div>
        <div id="t3" onclick="tab(3)">АЗС</div>
        <div id="t4" onclick="tab(4)">АРХИВ</div>
    </div>

    <div id="app">
        <div id="p1">
            <div class="card">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><small>ПРОБЕГ</small><input type="number" id="cur-km"></div>
                    <div style="flex:1"><small>МОТОЧАСЫ</small><input type="number" id="cur-h"></div>
                </div>
                <button class="btn" onclick="updateStats()">СОХРАНИТЬ ДАННЫЕ</button>
            </div>

            <div class="card">
                <h4>РЕСУРС МАСЛА (250 м/ч)</h4>
                <div class="chart-container"><canvas id="oilChart"></canvas></div>
            </div>

            <div class="card" id="maintenance-list"></div>
        </div>

        <div id="p2" style="display:none">
            <div class="card">
                <h3>🔧 Запись сервиса</h3>
                <input id="s-task" placeholder="Название работы">
                <input type="number" id="s-cost" placeholder="Стоимость, ₽">
                <button class="btn" onclick="saveService()">ЗАПИСАТЬ И В КАЛЕНДАРЬ</button>
            </div>
        </div>

        <div id="p3" style="display:none">
            <div class="card">
                <h3>⛽ Заправка</h3>
                <input type="number" id="f-l" placeholder="Литры">
                <input type="number" id="f-p" placeholder="Цена за литр">
                <div class="chart-container"><canvas id="fuelChart"></canvas></div>
                <button class="btn" onclick="saveFuel()">ЗАПИСАТЬ</button>
            </div>
        </div>

        <div id="p4" style="display:none">
            <div id="history-list"></div>
        </div>
    </div>

<script>
    const S_URL = 'sb_publishable_9obwGRLZL51CzAKEgQMosg_D87L5J1J';
    const S_KEY = '8712794502:AAHPboDckNXVW657jOz2OSs1mrn_NrkDoCc';
    const _sb = supabase.createClient(S_URL, S_KEY);

    let oilChart, fuelChart;

    async function tab(n) {
        document.querySelectorAll('[id^="p"]').forEach(p => p.style.display = 'none');
        document.getElementById('p'+n).style.display = 'block';
        document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('t'+n).classList.add('active');
        if(n === 1) initAnalytics();
        if(n === 4) loadHistory();
    }

    // --- АНАЛИТИКА И ДИАГРАММЫ ---
    async function initAnalytics() {
        const { data: settings } = await _sb.from('settings').select('*');
        const s = {}; settings.forEach(i => s[i.key] = i.value);
        document.getElementById('cur-km').value = s.current_km;
        document.getElementById('cur-h').value = s.current_h;

        // Диаграмма масла
        const oilRemain = Math.max(0, 250 - (s.current_h % 250));
        renderOilChart(oilRemain);

        // Список ТО с запчастями
        const { data: sched } = await _sb.from('maintenance_schedule').select('*');
        let html = '<h4>ГРАФИК ТО</h4>';
        sched.forEach(i => {
            const prog = i.type === 'Mileage' ? (s.current_km % i.trigger_val) / i.trigger_val : (s.current_h % i.trigger_val) / i.trigger_val;
            const perc = Math.min(Math.round(prog * 100), 100);
            html += `<div class="item" style="margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between"><span>${i.task}</span><b>${perc}%</b></div>
                <small class="parts-badge">📦 ${i.parts_needed}</small>
            </div>`;
        });
        document.getElementById('maintenance-list').innerHTML = html;
    }

    function renderOilChart(remain) {
        const ctx = document.getElementById('oilChart').getContext('2d');
        if(oilChart) oilChart.destroy();
        oilChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [remain, 250 - remain],
                    backgroundColor: [remain < 30 ? '#f87171' : '#38bdf8', '#334155'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { tooltip: { enabled: false } } }
        });
    }

    async function updateStats() {
        const km = document.getElementById('cur-km').value;
        const h = document.getElementById('cur-h').value;
        await _sb.from('settings').update({value: km}).eq('key', 'current_km');
        await _sb.from('settings').update({value: h}).eq('key', 'current_h');
        alert('Данные обновлены');
        initAnalytics();
    }

    // --- СЕРВИС И КАЛЕНДАРЬ ---
    async function saveService() {
        const task = document.getElementById('s-task').value;
        const cost = document.getElementById('s-cost').value;
        const km = document.getElementById('cur-km').value;
        
        const { data } = await _sb.from('service_logs').insert({task, km, cost}).select();
        await _sb.from('history').insert({category: '🔧 Сервис', km, description: task, cost, table_ref: 'service_logs', record_id: data[0].id});
        
        // Ссылка на календарь
        const date = new Date().toISOString().replace(/-|:|\.\d\d\d/g, "");
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=ТО: ${task}&details=Пробег: ${km}км. Запчасти проверены в приложении.&dates=${date}/${date}`;
        window.open(url, '_blank');
        
        alert('Записано!');
        tab(1);
    }

    // --- АЗС ---
    async function saveFuel() {
        const l = document.getElementById('f-l').value;
        const p = document.getElementById('f-p').value;
        const km = document.getElementById('cur-km').value;
        const total = l * p;
        await _sb.from('fuel_logs').insert({liters: l, price: p, km, total});
        await _sb.from('history').insert({category: '⛽ АЗС', km, description: `${l}л`, cost: total, table_ref: 'fuel_logs'});
        alert('Топливо учтено');
        tab(1);
    }

    // --- АРХИВ, РЕДАКТИРОВАНИЕ И УДАЛЕНИЕ ---
    async function loadHistory() {
        const { data } = await _sb.from('history').select('*').order('created_at', {ascending: false});
        document.getElementById('history-list').innerHTML = data.map(i => `
            <div class="hist-item">
                <div><b>${i.category}</b><br><small>${i.description} (${i.km} км)</small></div>
                <div style="text-align:right">
                    <b>${i.cost} ₽</b><br>
                    <span onclick="editEntry('${i.id}', '${i.cost}')" style="color:var(--acc)">✎</span>
                    <span onclick="deleteEntry('${i.id}', '${i.table_ref}', '${i.record_id}')" style="color:var(--red); margin-left:15px;">✕</span>
                </div>
            </div>
        `).join('');
    }

    async function deleteEntry(id, table, record_id) {
        if(confirm("Точно удалить запись? Это действие необратимо.")) {
            await _sb.from('history').delete().eq('id', id);
            if(table && record_id) await _sb.from(table).delete().eq('id', record_id);
            loadHistory();
        }
    }

    async function editEntry(id, oldCost) {
        const newCost = prompt("Введите новую стоимость:", oldCost);
        if(newCost !== null) {
            await _sb.from('history').update({cost: newCost}).eq('id', id);
            loadHistory();
        }
    }

    document.addEventListener('DOMContentLoaded', () => tab(1));
</script>
</body>
</html>
